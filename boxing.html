<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCKY vs COREY 🥊</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a00;
    background-image: 
      radial-gradient(ellipse at center, #3d1a00 0%, #1a0a00 70%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,100,0,0.03) 40px, rgba(255,100,0,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,100,0,0.03) 40px, rgba(255,100,0,0.03) 41px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Bangers', cursive;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  /* TITLE */
  .title-banner {
    width: 100%;
    text-align: center;
    padding: 18px 0 8px;
    background: linear-gradient(180deg, #ff6600, #cc3300);
    border-bottom: 6px solid #ffcc00;
    box-shadow: 0 4px 24px rgba(255,100,0,0.7);
    position: relative;
  }
  .title-banner h1 {
    font-size: clamp(2.5rem, 8vw, 5rem);
    color: #ffff00;
    text-shadow: 4px 4px 0 #cc0000, 7px 7px 0 #000;
    letter-spacing: 4px;
    line-height: 1;
  }
  .subtitle {
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    color: #fff;
    letter-spacing: 2px;
    margin-top: 4px;
    text-shadow: 1px 1px 3px #000;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 30px;
    background: #000;
    border: 4px solid #ffcc00;
    border-radius: 16px;
    margin: 18px auto 8px;
    box-shadow: 0 0 30px rgba(255,200,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
    min-width: 340px;
  }
  .score-block {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .score-name {
    font-size: clamp(1rem, 3vw, 1.6rem);
    letter-spacing: 2px;
  }
  .score-name.rocky { color: #ff4444; text-shadow: 2px 2px 0 #000; }
  .score-name.corey { color: #4488ff; text-shadow: 2px 2px 0 #000; }
  .score-val {
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    line-height: 1;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.8);
    transition: transform 0.15s, color 0.15s;
  }
  .score-val.rocky { color: #ff4444; }
  .score-val.corey { color: #4488ff; }
  .score-val.bump {
    transform: scale(1.5);
    color: #ffff00 !important;
  }
  .score-sep {
    font-size: clamp(2rem, 6vw, 4rem);
    color: #ffcc00;
    text-shadow: 2px 2px 0 #000;
    margin: 0 4px;
    padding-top: 16px;
  }

  .score-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-btn {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 3px solid #000;
    cursor: pointer;
    line-height: 1;
    box-shadow: 3px 3px 0 #000;
    transition: transform 0.1s, box-shadow 0.1s;
    background: #444;
    color: #fff;
  }
  .score-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }
  .score-btn.minus { background: #553333; color: #ffaaaa; }
  .rocky-btn { background: #cc2222; color: #fff; }
  .corey-btn { background: #2244cc; color: #fff; }


  .watcher-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 8px 0 0;
    position: relative;
    z-index: 10;
  }
  .watcher-label {
    font-size: 1rem;
    color: #ffcc00;
    letter-spacing: 2px;
    text-shadow: 1px 1px 3px #000;
    margin-bottom: 2px;
  }
  .watcher-bubble {
    background: #fffbe6;
    border: 3px solid #333;
    border-radius: 18px;
    padding: 6px 14px;
    font-family: 'Comic Neue', cursive;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: #222;
    margin-bottom: 6px;
    position: relative;
    box-shadow: 2px 2px 0 #000;
    max-width: 220px;
    text-align: center;
    transition: opacity 0.3s;
  }
  .watcher-bubble::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: #333;
  }
  .watcher-bubble::before {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #fffbe6;
    z-index: 1;
  }

  .watcher-char {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .watcher-head {
    width: 110px;
    height: 110px;
    border-radius: 8px;
    border: none;
    box-shadow: none;
    animation: watcher-wobble 3s ease-in-out infinite;
    animation-delay: 0.5s;
    transform-origin: center bottom;
    overflow: hidden;
    background: #f9c;
    position: relative;
  }
  .watcher-head img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    image-rendering: pixelated;
    filter: contrast(1.05) saturate(1.1);
  }
  .watcher-body {
    width: 60px;
    height: 30px;
    background: #7c3c00;
    border-radius: 0 0 12px 12px;
    border: 3px solid #000;
    border-top: none;
    margin-top: -4px;
  }

  /* RING / ARENA */
  .ring-area {
    width: min(700px, 96vw);
    background: linear-gradient(180deg, #1a6600 0%, #228800 40%, #1a6600 100%);
    border: 6px solid #8B5C00;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
    margin-top: 10px;
    padding: 16px 0 0;
  }
  /* Ring mat lines */
  .ring-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      repeating-linear-gradient(90deg, transparent, transparent 98%, rgba(255,255,255,0.07) 98%, rgba(255,255,255,0.07) 100%),
      repeating-linear-gradient(0deg, transparent, transparent 98%, rgba(255,255,255,0.07) 98%, rgba(255,255,255,0.07) 100%);
    background-size: 50px 50px;
    pointer-events: none;
  }
  /* Ring ropes */
  .ring-ropes {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }
  .rope {
    position: absolute;
    left: 0; right: 0;
    height: 5px;
    border-radius: 3px;
  }
  .rope-1 { top: 22%; background: linear-gradient(90deg, #8B5C00, #c89030, #8B5C00); }
  .rope-2 { top: 44%; background: linear-gradient(90deg, #8B5C00, #c89030, #8B5C00); }
  .rope-3 { top: 66%; background: linear-gradient(90deg, #8B5C00, #c89030, #8B5C00); }

  /* FIGHTERS AREA */
  .fighters-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 10px 20px 0;
    position: relative;
    z-index: 10;
    height: 260px;
  }

  /* FIGHTER CHARACTER */
  .fighter {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    transition: transform 0.1s;
  }
  .fighter-name-tag {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    letter-spacing: 2px;
    margin-bottom: 4px;
    text-shadow: 2px 2px 0 #000;
  }
  .fighter-name-tag.rocky { color: #ff4444; }
  .fighter-name-tag.corey { color: #4488ff; }

  @keyframes head-wobble {
    0%   { transform: rotate(0deg) scale(1); }
    15%  { transform: rotate(-6deg) scale(1.04); }
    30%  { transform: rotate(5deg) scale(0.97); }
    45%  { transform: rotate(-4deg) scale(1.03); }
    60%  { transform: rotate(3deg) scale(0.98); }
    75%  { transform: rotate(-2deg) scale(1.01); }
    90%  { transform: rotate(1deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }
  @keyframes watcher-wobble {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-8deg) scale(1.06); }
    40%  { transform: rotate(7deg) scale(0.95); }
    55%  { transform: rotate(-5deg) scale(1.04); }
    70%  { transform: rotate(4deg) scale(0.98); }
    85%  { transform: rotate(-2deg) scale(1.01); }
    100% { transform: rotate(0deg) scale(1); }
  }

  /* Mortal Kombat idle bounce — whole fighter sways side to side */
  @keyframes idle-bounce-rocky {
    0%   { transform: translateX(0px) translateY(0px); }
    12%  { transform: translateX(6px) translateY(-4px); }
    25%  { transform: translateX(10px) translateY(0px); }
    37%  { transform: translateX(6px) translateY(-3px); }
    50%  { transform: translateX(0px) translateY(-5px); }
    62%  { transform: translateX(-6px) translateY(-3px); }
    75%  { transform: translateX(-10px) translateY(0px); }
    87%  { transform: translateX(-6px) translateY(-4px); }
    100% { transform: translateX(0px) translateY(0px); }
  }
  @keyframes idle-bounce-corey {
    0%   { transform: translateX(0px) translateY(0px); }
    12%  { transform: translateX(-6px) translateY(-4px); }
    25%  { transform: translateX(-10px) translateY(0px); }
    37%  { transform: translateX(-6px) translateY(-3px); }
    50%  { transform: translateX(0px) translateY(-5px); }
    62%  { transform: translateX(6px) translateY(-3px); }
    75%  { transform: translateX(10px) translateY(0px); }
    87%  { transform: translateX(6px) translateY(-4px); }
    100% { transform: translateX(0px) translateY(0px); }
  }
  /* Leg alternating step */
  @keyframes leg-left-step {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    25%     { transform: translateY(-6px) rotate(-8deg); }
    75%     { transform: translateY(3px) rotate(4deg); }
  }
  @keyframes leg-right-step {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    25%     { transform: translateY(3px) rotate(-4deg); }
    75%     { transform: translateY(-6px) rotate(8deg); }
  }
  /* Arms guard bounce */
  @keyframes arm-left-guard {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    50%     { transform: translateY(-5px) rotate(-6deg); }
  }
  @keyframes arm-right-guard {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    50%     { transform: translateY(-5px) rotate(6deg); }
  }

  .fighter.rocky-fighter { animation: idle-bounce-rocky 0.9s ease-in-out infinite; }
  .fighter.corey-fighter { animation: idle-bounce-corey 0.9s ease-in-out infinite; animation-delay: 0.15s; }

  /* Legs animate when idle (not when falling) */
  .rocky-fighter:not(.falling-right):not(.falling-left) .fighter-legs .leg:first-child,
  .corey-fighter:not(.falling-left):not(.falling-right) .fighter-legs .leg:first-child {
    animation: leg-left-step 0.9s ease-in-out infinite;
  }
  .rocky-fighter:not(.falling-right):not(.falling-left) .fighter-legs .leg:last-child,
  .corey-fighter:not(.falling-left):not(.falling-right) .fighter-legs .leg:last-child {
    animation: leg-right-step 0.9s ease-in-out infinite;
  }
  /* Arms bob in guard position */
  .rocky-fighter:not(.falling-right):not(.falling-left) .fighter-arms .arm:first-child,
  .corey-fighter:not(.falling-left):not(.falling-right) .fighter-arms .arm:first-child {
    animation: arm-left-guard 0.9s ease-in-out infinite;
  }
  .rocky-fighter:not(.falling-right):not(.falling-left) .fighter-arms .arm:last-child,
  .corey-fighter:not(.falling-left):not(.falling-right) .fighter-arms .arm:last-child {
    animation: arm-right-guard 0.9s ease-in-out infinite;
    animation-delay: 0.45s;
  }

  /* The big bubble head */
  .fighter-head-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    animation: head-wobble 2.2s ease-in-out infinite;
    transform-origin: center bottom;
  }
  .rocky-fighter .fighter-head-wrap { animation-delay: 0s; }
  .corey-fighter .fighter-head-wrap { animation-delay: 1.1s; }

  .fighter-head {
    width: 120px;
    height: 120px;
    border-radius: 8px;
    overflow: hidden;
    border: none;
    box-shadow: none;
    background: #c8a87a;
    position: relative;
    z-index: 2;
  }
  .fighter-head img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    image-rendering: pixelated;
    filter: contrast(1.05) saturate(1.1);
  }
  /* Placeholder head */
  .fighter-head.placeholder {
    background: linear-gradient(135deg, #888, #555);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  /* Body */
  .fighter-body {
    width: 80px;
    height: 80px;
    position: relative;
    margin-top: -10px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .fighter-torso {
    width: 60px;
    height: 55px;
    border-radius: 12px 12px 8px 8px;
    border: 3px solid #000;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    color: rgba(255,255,255,0.8);
    font-family: 'Bangers', cursive;
    letter-spacing: 1px;
    text-shadow: 1px 1px 0 #000;
  }
  .fighter.rocky-fighter .fighter-torso { background: linear-gradient(180deg, #cc2222, #880000); }
  .fighter.corey-fighter .fighter-torso { background: linear-gradient(180deg, #2244cc, #001188); }

  /* Legs */
  .fighter-legs {
    display: flex;
    gap: 8px;
    margin-top: 3px;
  }
  .leg {
    width: 18px;
    height: 28px;
    border-radius: 0 0 8px 8px;
    border: 3px solid #000;
    border-top: none;
    transform-origin: top center;
  }
  .fighter.rocky-fighter .leg { background: #cc2222; }
  .fighter.corey-fighter .leg { background: #2244cc; }

  /* Arms / Gloves */
  .fighter-arms {
    position: absolute;
    top: 0;
    width: 100%;
    height: 55px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .arm {
    width: 18px;
    height: 36px;
    border-radius: 8px;
    border: 3px solid #000;
    transform-origin: top center;
  }
  .fighter.rocky-fighter .arm { background: #cc2222; }
  .fighter.corey-fighter .arm { background: #2244cc; }

  .glove {
    width: 32px;
    height: 28px;
    border-radius: 50% 50% 40% 40%;
    border: 3px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    box-shadow: 2px 2px 0 #000;
  }
  .fighter.rocky-fighter .glove { background: radial-gradient(circle at 40% 35%, #ff8888, #dd0000); }
  .fighter.corey-fighter .glove { background: radial-gradient(circle at 40% 35%, #8888ff, #0000dd); }

  /* PUNCH ARM - the extended punch arm */
  .punch-arm {
    position: absolute;
    top: 10px;
    display: flex;
    align-items: center;
    gap: 0;
    transform-origin: left center;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .punch-arm.active { opacity: 1; }
  .rocky-fighter .punch-arm { right: -80px; flex-direction: row; }
  .corey-fighter .punch-arm { left: -80px; flex-direction: row-reverse; }

  .punch-arm-segment {
    width: 45px;
    height: 18px;
    border-radius: 8px;
    border: 3px solid #000;
  }
  .rocky-fighter .punch-arm-segment { background: #cc2222; }
  .corey-fighter .punch-arm-segment { background: #2244cc; }

  .punch-glove-big {
    width: 40px;
    height: 36px;
    border-radius: 50% 50% 40% 40%;
    border: 3px solid #000;
    box-shadow: 3px 3px 0 #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }
  .rocky-fighter .punch-glove-big { background: radial-gradient(circle at 40% 35%, #ff8888, #dd0000); }
  .corey-fighter .punch-glove-big { background: radial-gradient(circle at 40% 35%, #8888ff, #0000dd); }

  /* FALL ANIMATION */
  @keyframes fall-right {
    0% { transform: translateX(0) rotate(0deg); }
    30% { transform: translateX(30px) rotate(20deg); }
    60% { transform: translateX(60px) rotate(60deg) translateY(20px); }
    100% { transform: translateX(50px) rotate(90deg) translateY(50px); }
  }
  @keyframes fall-left {
    0% { transform: translateX(0) rotate(0deg); }
    30% { transform: translateX(-30px) rotate(-20deg); }
    60% { transform: translateX(-60px) rotate(-60deg) translateY(20px); }
    100% { transform: translateX(-50px) rotate(-90deg) translateY(50px); }
  }
  @keyframes punch-rocky {
    0% { transform: scaleX(0) translateX(-10px); opacity: 0; }
    20% { transform: scaleX(1) translateX(0); opacity: 1; }
    60% { transform: scaleX(1) translateX(0); opacity: 1; }
    100% { transform: scaleX(0); opacity: 0; }
  }
  @keyframes punch-corey {
    0% { transform: scaleX(0) translateX(10px); opacity: 0; }
    20% { transform: scaleX(1) translateX(0); opacity: 1; }
    60% { transform: scaleX(1) translateX(0); opacity: 1; }
    100% { transform: scaleX(0); opacity: 0; }
  }
  @keyframes shake-screen {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  @keyframes stars-spin {
    0% { transform: rotate(0deg) scale(0); opacity: 0; }
    20% { transform: rotate(180deg) scale(1.2); opacity: 1; }
    70% { transform: rotate(360deg) scale(1); opacity: 1; }
    100% { transform: rotate(400deg) scale(0); opacity: 0; }
  }

  .fighter.falling-right { animation: fall-right 0.6s ease-in forwards; }
  .fighter.falling-left { animation: fall-left 0.6s ease-in forwards; }

  .punch-arm.punch-anim-rocky {
    animation: punch-rocky 0.5s ease-in-out forwards;
  }
  .punch-arm.punch-anim-corey {
    animation: punch-corey 0.5s ease-in-out forwards;
  }

  /* Stars burst at impact */
  .stars-burst {
    position: absolute;
    font-size: 1.6rem;
    pointer-events: none;
    opacity: 0;
    z-index: 30;
    top: 30px;
  }
  .stars-burst.active {
    animation: stars-spin 0.7s ease-out forwards;
  }
  .rocky-stars { right: 60px; }
  .corey-stars { left: 60px; }

  /* IMPACT FLASH */
  .impact-flash {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    pointer-events: none;
    z-index: 50;
    transition: background 0.05s;
  }
  .impact-flash.flash { background: rgba(255,255,255,0.35); }

  /* RING FLOOR */
  .ring-floor {
    height: 32px;
    background: linear-gradient(180deg, #d4a84b, #a07030);
    border-top: 4px solid #8B5C00;
    position: relative;
    z-index: 4;
  }
  .ring-floor::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 3px;
    background: rgba(255,255,255,0.15);
  }

  /* COMMENTARY */
  .commentary-bar {
    width: min(700px, 96vw);
    background: #111;
    border: 3px solid #ffcc00;
    border-radius: 0 0 10px 10px;
    padding: 8px 20px;
    text-align: center;
    font-family: 'Comic Neue', cursive;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: #ffcc00;
    min-height: 44px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.7);
    transition: opacity 0.3s;
  }

  /* FOOTER */
  .footer {
    margin-top: 18px;
    font-size: 0.75rem;
    color: rgba(255,200,0,0.4);
    letter-spacing: 2px;
    font-family: 'Comic Neue', cursive;
  }

  /* KO Banner */
  .ko-banner {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .ko-banner.show {
    opacity: 1;
    pointer-events: auto;
  }
  .ko-text {
    font-size: clamp(4rem, 15vw, 10rem);
    color: #ffff00;
    text-shadow: 8px 8px 0 #cc0000, 14px 14px 0 #000;
    animation: ko-pulse 0.4s ease-in-out infinite alternate;
    text-align: center;
    line-height: 1;
  }
  @keyframes ko-pulse {
    from { transform: scale(1) rotate(-3deg); }
    to { transform: scale(1.06) rotate(3deg); }
  }
</style>
</head>
<body>

<!-- TITLE -->
<div class="title-banner">
  <h1>🥊 ROCKY vs COREY 🥊</h1>
  <div class="subtitle">THE FIGHT OF THE CENTURY</div>
</div>

<!-- SCOREBOARD -->
<div class="scoreboard">

<div class="footer">⚡ ROUND BY ROUND — WINNER TAKES ALL ⚡</div>

<script>
const scoreRocky = { val: 0, el: document.getElementById('score-rocky') };
const scoreCorey = { val: 0, el: document.getElementById('score-corey') };
const commentary = document.getElementById('commentary');
const fighterRocky = document.getElementById('fighter-rocky');
const fighterCorey = document.getElementById('fighter-corey');
const rockyPunch = document.getElementById('rocky-punch');
const coreyPunch = document.getElementById('corey-punch');
const rockyStars = document.getElementById('rocky-stars');
const coreyStars = document.getElementById('corey-stars');
const impactFlash = document.getElementById('impact-flash');
const watcherSpeech = document.getElementById('watcher-speech');

const rockyComments = [
  "ROCKY WITH THE HAYMAKER!!! 💥",
  "Rocky's fist arrived before his apology 🤣",
  "LIGHTS OUT COREY!! 😵",
  "Rocky said 'take a nap' 💤",
  "ROCKY SENDS COREY TO THE SHADOW REALM 🌑",
  "Rocky's glove just filed a noise complaint 🥊",
  "BOOM! Corey is doing a geography lesson on the floor 🌍",
  "Rocky woke up and chose violence 💪",
];
const coreyComments = [
  "COREY COUNTERS!! DEVASTATING!! 💥",
  "Corey just rearranged Rocky's face 😬",
  "COREY WITH THE KNOCKOUT PUNCH! 🎯",
  "Corey said 'not today pal' 😤",
  "COREY SENDS ROCKY TO THE SHADOW REALM 🌑",
  "Rocky's knees just submitted their resignation 🦵",
  "BOOM! Rocky is learning about gravity again 🍎",
  "Corey woke up and ALSO chose violence 🤛",
];
const watcherQuips = [
  "Oh lord, here we go again...",
  "I did NOT sign up for this 😅",
  "Somebody call 911 🚨",
  "I'm just here for the snacks 🍿",
  "This is better than Netflix tbh",
  "Should I be concerned? No. I'm not. 😬",
  "They do this EVERY Tuesday 🤦",
  "My therapist told me to 'find community' 😐",
  "I feel like I need a helmet watching this",
  "Both of them need Jesus 🙏",
];

function flashScreen() {
  impactFlash.classList.add('flash');
  setTimeout(() => impactFlash.classList.remove('flash'), 80);
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function showWatcherQuip() {
  watcherSpeech.style.opacity = '0';
  setTimeout(() => {
    watcherSpeech.textContent = randomFrom(watcherQuips);
    watcherSpeech.style.opacity = '1';
  }, 300);
}

let isAnimating = false;
let roundTimeout;

function adjustScore(fighter, delta) {
  const s = fighter === 'rocky' ? scoreRocky : scoreCorey;
  s.val = Math.max(0, s.val + delta);
  s.el.textContent = s.val;
  if (delta > 0) {
    s.el.classList.remove('bump');
    void s.el.offsetWidth; // reflow to restart animation
    s.el.classList.add('bump');
    setTimeout(() => s.el.classList.remove('bump'), 300);
    // trigger the fight animation for the winner
    triggerPunch(fighter === 'rocky');
  }
}

function triggerPunch(rockyWins) {
  if (isAnimating) return;
  isAnimating = true;

  fighterRocky.className = 'fighter rocky-fighter';
  fighterCorey.className = 'fighter corey-fighter';
  rockyPunch.className = 'punch-arm';
  coreyPunch.className = 'punch-arm';
  rockyStars.className = 'stars-burst rocky-stars';
  coreyStars.className = 'stars-burst corey-stars';

  setTimeout(() => {
    if (rockyWins) {
      rockyPunch.className = 'punch-arm punch-anim-rocky';
      commentary.textContent = randomFrom(rockyComments);
    } else {
      coreyPunch.className = 'punch-arm punch-anim-corey';
      commentary.textContent = randomFrom(coreyComments);
    }

    setTimeout(() => {
      flashScreen();
      if (rockyWins) {
        coreyStars.className = 'stars-burst corey-stars active';
        setTimeout(() => { fighterCorey.className = 'fighter corey-fighter falling-left'; }, 100);
      } else {
        rockyStars.className = 'stars-burst rocky-stars active';
        setTimeout(() => { fighterRocky.className = 'fighter rocky-fighter falling-right'; }, 100);
      }
      showWatcherQuip();
    }, 250);

    setTimeout(() => { isAnimating = false; }, 1400);
  }, 200);
}
</script>

</body>
</html>
